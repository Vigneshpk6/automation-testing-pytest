<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Sample App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a30;
      --accent: #b5f23c;
      --accent2: #ff5c5c;
      --text: #e8e8f0;
      --muted: #7a7a8c;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 640px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .logo span { color: var(--accent); }

    .badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }
    #task-count { color: var(--accent); font-weight: 500; }

    /* Input area */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    #task-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    #task-input::placeholder { color: var(--muted); }
    #task-input:focus { border-color: var(--accent); }

    #priority-select {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    #add-btn {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: var(--radius);
      padding: 14px 22px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    #add-btn:hover { opacity: .85; }
    #add-btn:active { transform: scale(.97); }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .filter-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 7px 16px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(181,242,60,.08);
    }

    /* Task list */
    #task-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn .25s ease;
      transition: border-color .2s, opacity .2s;
    }
    .task-item:hover { border-color: #3a3a44; }
    .task-item.completed { opacity: .5; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-check {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
      background: none;
    }
    .task-check.done { background: var(--accent); border-color: var(--accent); }
    .task-check.done::after { content: '✓'; color: #0d0d0f; font-size: 12px; font-weight: 800; }

    .task-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.4;
      transition: text-decoration .2s;
    }
    .task-item.completed .task-text { text-decoration: line-through; color: var(--muted); }

    .priority-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 6px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .priority-tag.high   { background: rgba(255,92,92,.15); color: #ff5c5c; }
    .priority-tag.medium { background: rgba(255,200,80,.15); color: #ffc850; }
    .priority-tag.low    { background: rgba(181,242,60,.12); color: var(--accent); }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color .2s, background .2s;
      flex-shrink: 0;
    }
    .delete-btn:hover { color: var(--accent2); background: rgba(255,92,92,.1); }

    /* Empty state */
    #empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      display: none;
    }
    #empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    #empty-state p { font-size: 15px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--accent);
      color: #0d0d0f;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 22px;
      border-radius: 10px;
      opacity: 0;
      transform: translateY(12px);
      transition: all .3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* Login overlay */
    #login-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .login-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%; max-width: 380px;
      text-align: center;
    }
    .login-box h2 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .login-box p  { color: var(--muted); font-size: 14px; margin-bottom: 30px; }

    .login-field {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      margin-bottom: 12px;
      transition: border-color .2s;
    }
    .login-field:focus { border-color: var(--accent); }

    #login-btn {
      width: 100%;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity .2s;
    }
    #login-btn:hover { opacity: .85; }

    #login-error {
      color: var(--accent2);
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }
  </style>
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-box">
    <h2>Task<span style="color:var(--accent)">Flow</span></h2>
    <p>Sign in to manage your tasks</p>
    <input id="username" class="login-field" type="text" placeholder="Username" autocomplete="off" />
    <input id="password" class="login-field" type="password" placeholder="Password" />
    <button id="login-btn">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- Main App -->
<div class="container">
  <header>
    <div class="logo">Task<span>Flow</span></div>
    <div class="badge"><span id="task-count">0</span> tasks</div>
  </header>

  <div class="input-row">
    <input id="task-input" type="text" placeholder="Add a new task…" />
    <select id="priority-select">
      <option value="low">🟢 Low</option>
      <option value="medium" selected>🟡 Medium</option>
      <option value="high">🔴 High</option>
    </select>
    <button id="add-btn">+ Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Done</button>
  </div>

  <ul id="task-list"></ul>
  <div id="empty-state">
    <div class="icon">📋</div>
    <p>No tasks here. Add one above!</p>
  </div>
</div>

<div id="toast"></div>

<script>
  const VALID_USERS = { admin: 'admin123', user: 'pass123' };
  let tasks = [], filter = 'all';

  // --- Login ---
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('password').addEventListener('keydown', e => e.key === 'Enter' && doLogin());

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (VALID_USERS[u] === p) {
      document.getElementById('login-overlay').style.display = 'none';
      showToast('Welcome back, ' + u + '!');
    } else {
      document.getElementById('login-error').textContent = 'Invalid username or password.';
    }
  }

  // --- Tasks ---
  document.getElementById('add-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', e => e.key === 'Enter' && addTask());

  function addTask() {
    const text = document.getElementById('task-input').value.trim();
    if (!text) return;
    const priority = document.getElementById('priority-select').value;
    tasks.push({ id: Date.now(), text, priority, done: false });
    document.getElementById('task-input').value = '';
    renderTasks();
    showToast('Task added!');
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    renderTasks();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    renderTasks();
    showToast('Task deleted.');
  }

  function renderTasks() {
    const visible = tasks.filter(t =>
      filter === 'all' ? true : filter === 'active' ? !t.done : t.done
    );
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    visible.forEach(t => {
      const li = document.createElement('li');
      li.className = 'task-item' + (t.done ? ' completed' : '');
      li.dataset.id = t.id;
      li.innerHTML = `
        <div class="task-check${t.done ? ' done' : ''}" onclick="toggleTask(${t.id})" data-testid="check-${t.id}"></div>
        <span class="task-text">${t.text}</span>
        <span class="priority-tag ${t.priority}">${t.priority}</span>
        <button class="delete-btn" onclick="deleteTask(${t.id})" data-testid="delete-${t.id}" title="Delete">✕</button>
      `;
      list.appendChild(li);
    });
    document.getElementById('task-count').textContent = tasks.length;
    document.getElementById('empty-state').style.display = visible.length ? 'none' : 'block';
  }

  // --- Filters ---
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTasks();
    });
  });

  // --- Toast ---
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
